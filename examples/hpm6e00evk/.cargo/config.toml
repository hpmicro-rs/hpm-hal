[build]
target = "riscv32imafc-unknown-none-elf"

[target.riscv32imafc-unknown-none-elf]
# runner = 'riscv64-unknown-elf-gdb -x ../../openocd.gdb'
runner = [
    "probe-rs",
    "run",
    "--chip",
    "HPM6E80",
    "--chip-description-path",
    "../../HPMicro.yaml",
    "--protocol",
    "jtag",
    "--log-format",
    "{t} {L} {fff}:{l} {s}",
]

rustflags = [
    # Target features:
    "-C",
    "target-feature=+zba,+zbb,+zbc,+zbs,+d,+zfh",
    # Linker scripts:
    "-C",
    "link-arg=-Tmemory.x",
    "-C",
    "link-arg=-Tdevice.x",
    "-C",
    "link-arg=-Thpm-link.x",
    "-C",
    "link-arg=-Tdefmt.x",
    "-C",
    "link-arg=-nmagic",
]

[unstable]
build-std = ["core"]

[env]
DEFMT_LOG = "trace"
