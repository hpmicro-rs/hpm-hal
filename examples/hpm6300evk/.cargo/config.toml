[build]
target = "riscv32imafc-unknown-none-elf"

[target.riscv32imafc-unknown-none-elf]
# runner = 'riscv64-unknown-elf-gdb -x ../../openocd.gdb'
runner = [
    "probe-rs",
    "run",
    "--chip",
    "HPM6360",
    "--chip-description-path",
    "../../HPMicro.yaml",
    "--protocol",
    "jtag",
    "--log-format",
    "{t} {L} {fff}:{l} {s}",
]

rustflags = [
    "-C",
    # HPM6360 RISC-V extension status (verified by testing):
    # - ZBB: mmsc_cfg2[5]=1 reports support, BUT actually causes illegal instruction!
    # - ZBA/ZBC/ZBS: NOT supported (mmsc_cfg2 bits 4,6,7 = 0)
    # DO NOT enable +zbb, +zba, +zbc, +zbs for HPM6360!
    "target-feature=+d,+zfh",
    # Linker scripts:
    "-C",
    "link-arg=-Tmemory.x",
    "-C",
    "link-arg=-Tdevice.x",
    "-C",
    "link-arg=-Thpm-link.x",
    "-C",
    "link-arg=-Tdefmt.x",
    "-C",
    "link-arg=-nmagic",
]

[unstable]
build-std = ["core"]

[env]
DEFMT_LOG = "info"
