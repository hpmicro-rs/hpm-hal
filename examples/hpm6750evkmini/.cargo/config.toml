[build]
target = "riscv32imafc-unknown-none-elf"

[target.riscv32imafc-unknown-none-elf]
# runner = 'riscv64-unknown-elf-gdb -x ./openocd-semihosting.gdb'
runner = [
    "probe-rs",
    "run",
    "--chip",
    "HPM6750",
    "--chip-description-path",
    "./HPM6700_Series.yaml",
    "--protocol",
    "jtag",
    "--log-format",
    "{t} {L} {fff}:{l} {s}",
]
rustflags = [
    # +zba,+zbb,+zbc,+zbs are not available on hpm67
    "-C",
    "target-feature=+zfh",
    # Linker scripts:
    "-C",
    "link-arg=-Tmemory-xpi.x",
    "-C",
    "link-arg=-Tdevice.x",
    "-C",
    "link-arg=-Thpm-link.x",
    "-C",
    "link-arg=-Tdefmt.x",
    "-C",
    "link-arg=-nmagic",
]

[unstable]
build-std = ["core"]

[env]
DEFMT_LOG = "trace"