name: HPM6700 Series
variants:
- name: HPM6750
  cores:
  - name: core0
    type: riscv
    core_access_options: !Riscv
  memory_map:
  - !Ram
    name: ILM0
    range:
      start: 0x0
      end: 0x40000
    cores:
    - core0
  - !Ram
    name: DLM0
    range:
      start: 0x00080000
      end: 0x000c0000
    cores:
    - core0
  - !Ram
    name: AXI_SRAM
    range:
      start: 0x01080000
      end: 0x01100000
    cores:
    - core0
  - !Ram
    name: AXI_SRAM_NOCACHE
    range:
      start: 0x01100000
      end: 0x01180000
    cores:
    - core0
  - !Ram
    name: SHARE_RAM
    range:
      start: 0x01180000
      end: 0x011a0000
    cores:
    - core0
  - !Nvm
    name: XPI0
    range:
      start: 0x80000000
      end: 0x90000000
    cores:
    - core0
    access:
      boot: true
  - !Ram
    name: AHB_SRAM
    range:
      start: 0xf0400000
      end: 0xf0408000
    cores:
    - core0
  flash_algorithms:
  - flash-algo-hpm6750
flash_algorithms:
- name: flash-algo-hpm6750
  description: flash algorithm for hpm6750 series
  default: true
  instructions: 
  load_address: 0x01080020
  pc_init: 0x0
  pc_uninit: 0x112
  pc_program_page: 0x162
  pc_erase_sector: 0x126
  pc_erase_all: 0x1a6
  data_section_offset: 0x48c
  flash_properties:
    address_range:
      start: 0x80000000
      end: 0x90000000
    page_size: 4096
    erased_byte_value: 0xff
    program_page_timeout: 1000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x1000
      address: 0x0
  stack_size: 4096
